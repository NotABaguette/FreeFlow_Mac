name: Build & Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: Build & Test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using: $XCODE"
          sudo xcode-select -s "$XCODE/Contents/Developer"

      - name: Swift version
        run: swift --version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: List schemes
        run: xcodebuild -project FreeFlow.xcodeproj -list

      - name: Build & test CLI (SPM)
        run: |
          swift build
          swift test --parallel

      - name: Build GUI app (ARM64)
        run: |
          xcodebuild build \
            -project FreeFlow.xcodeproj \
            -scheme FreeFlow \
            -configuration Release \
            -arch arm64 \
            -derivedDataPath build/arm64 \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Build GUI app (x86_64)
        run: |
          xcodebuild build \
            -project FreeFlow.xcodeproj \
            -scheme FreeFlow \
            -configuration Release \
            -arch x86_64 \
            -derivedDataPath build/x86_64 \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Find built apps
        run: |
          echo "=== Searching for FreeFlow.app ==="
          find build -name "*.app" -type d 2>/dev/null
          echo "=== ARM64 products ==="
          ls -la build/arm64/Build/Products/Release/ 2>/dev/null || echo "No ARM64 products"
          echo "=== x86_64 products ==="
          ls -la build/x86_64/Build/Products/Release/ 2>/dev/null || echo "No x86_64 products"

      - name: Create Universal Binary
        run: |
          mkdir -p artifacts

          # Find the .app wherever xcodebuild put it
          ARM64_APP=$(find build/arm64 -name "FreeFlow.app" -type d | head -1)
          X86_APP=$(find build/x86_64 -name "FreeFlow.app" -type d | head -1)

          echo "ARM64 app: $ARM64_APP"
          echo "x86_64 app: $X86_APP"

          if [ -n "$ARM64_APP" ] && [ -n "$X86_APP" ]; then
            cp -R "$ARM64_APP" "artifacts/FreeFlow.app"
            lipo -create \
              "$ARM64_APP/Contents/MacOS/FreeFlow" \
              "$X86_APP/Contents/MacOS/FreeFlow" \
              -output "artifacts/FreeFlow.app/Contents/MacOS/FreeFlow"
            echo "Universal binary created:"
            file "artifacts/FreeFlow.app/Contents/MacOS/FreeFlow"
          elif [ -n "$ARM64_APP" ]; then
            cp -R "$ARM64_APP" "artifacts/FreeFlow.app"
            echo "ARM64 only:"
            file "artifacts/FreeFlow.app/Contents/MacOS/FreeFlow"
          else
            echo "ERROR: No .app built"
            exit 1
          fi

      - name: Build CLI release
        run: |
          swift build -c release
          cp .build/release/freeflow artifacts/freeflow
          chmod +x artifacts/freeflow

      - name: Package artifacts
        run: |
          cd artifacts
          ditto -c -k --sequesterRsrc --keepParent FreeFlow.app FreeFlow-macOS-universal.zip
          tar czf freeflow-cli-macOS.tar.gz freeflow
          shasum -a 256 FreeFlow-macOS-universal.zip freeflow-cli-macOS.tar.gz > checksums.txt
          echo "{\"commit\": \"$GITHUB_SHA\", \"date\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > build-info.json
          rm -rf FreeFlow.app freeflow
          ls -la

      - name: Upload GUI App
        uses: actions/upload-artifact@v4
        with:
          name: FreeFlow-macOS-app
          path: artifacts/FreeFlow-macOS-universal.zip
          retention-days: 90

      - name: Upload CLI
        uses: actions/upload-artifact@v4
        with:
          name: FreeFlow-macOS-cli
          path: artifacts/freeflow-cli-macOS.tar.gz
          retention-days: 90

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: |
            artifacts/checksums.txt
            artifacts/build-info.json
          retention-days: 90
