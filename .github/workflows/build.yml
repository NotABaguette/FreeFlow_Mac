name: Build & Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: Build & Test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Swift version
        run: swift --version

      - name: Build debug
        run: swift build

      - name: Build release
        run: swift build -c release

      - name: Run tests
        run: swift test --parallel

      - name: Run self-test
        run: swift run freeflow test

      - name: Package release binary
        run: |
          mkdir -p artifacts
          cp .build/release/freeflow artifacts/freeflow
          chmod +x artifacts/freeflow
          # Create tar
          cd artifacts && tar czf freeflow-macos-arm64.tar.gz freeflow
          shasum -a 256 freeflow-macos-arm64.tar.gz > checksums.txt
          echo "{\"commit\": \"$GITHUB_SHA\", \"date\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > build-info.json

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: freeflow-macos-${{ github.sha }}
          path: |
            artifacts/freeflow-macos-arm64.tar.gz
            artifacts/checksums.txt
            artifacts/build-info.json
          retention-days: 30
