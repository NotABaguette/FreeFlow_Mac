name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build & Release
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using: $XCODE"
          sudo xcode-select -s "$XCODE/Contents/Developer"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Run tests
        run: swift test --parallel

      - name: Build GUI (ARM64)
        run: |
          xcodebuild build \
            -project FreeFlow.xcodeproj \
            -scheme FreeFlow \
            -configuration Release \
            -arch arm64 \
            -derivedDataPath build/arm64 \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Build GUI (x86_64)
        run: |
          xcodebuild build \
            -project FreeFlow.xcodeproj \
            -scheme FreeFlow \
            -configuration Release \
            -arch x86_64 \
            -derivedDataPath build/x86_64 \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package release
        run: |
          VERSION=${GITHUB_REF_NAME}
          mkdir -p release

          ARM64_APP=$(find build/arm64 -name "FreeFlow.app" -type d | head -1)
          X86_APP=$(find build/x86_64 -name "FreeFlow.app" -type d | head -1)

          if [ -n "$ARM64_APP" ] && [ -n "$X86_APP" ]; then
            cp -R "$ARM64_APP" "release/FreeFlow.app"
            lipo -create \
              "$ARM64_APP/Contents/MacOS/FreeFlow" \
              "$X86_APP/Contents/MacOS/FreeFlow" \
              -output "release/FreeFlow.app/Contents/MacOS/FreeFlow"
          elif [ -n "$ARM64_APP" ]; then
            cp -R "$ARM64_APP" "release/FreeFlow.app"
          fi

          cd release
          ditto -c -k --sequesterRsrc --keepParent FreeFlow.app "FreeFlow-${VERSION}-macOS-universal.zip"
          rm -rf FreeFlow.app
          cd ..

          swift build -c release
          cp .build/release/freeflow release/
          cd release
          tar czf "freeflow-cli-${VERSION}-macOS.tar.gz" freeflow
          rm freeflow
          cd ..

          git archive --format=tar.gz --prefix=FreeFlow-Mac-${VERSION}/ HEAD > "release/source-${VERSION}.tar.gz"

          cd release && shasum -a 256 *.tar.gz *.zip > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          body: |
            ## FreeFlow for macOS ${{ github.ref_name }}

            ### Downloads
            - **FreeFlow-${{ github.ref_name }}-macOS-universal.zip** — GUI app (ARM64 + Intel)
            - **freeflow-cli-${{ github.ref_name }}-macOS.tar.gz** — CLI tool

            ### Install
            1. Download the `.zip`
            2. Unzip → drag `FreeFlow.app` to `/Applications`
            3. Right-click → Open (first launch)
          draft: false
