name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build & Release
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Run tests
        run: swift test --parallel

      - name: Build release
        run: swift build -c release

      - name: Run self-test
        run: swift run freeflow test

      - name: Package
        run: |
          VERSION=${GITHUB_REF_NAME}
          mkdir -p release

          # Binary
          cp .build/release/freeflow release/freeflow
          chmod +x release/freeflow
          cd release
          tar czf "freeflow-macos-arm64-${VERSION}.tar.gz" freeflow
          rm freeflow

          # Source
          cd ..
          git archive --format=tar.gz --prefix=FreeFlow-Mac-${VERSION}/ HEAD > "release/source-${VERSION}.tar.gz"

          # Checksums
          cd release && shasum -a 256 *.tar.gz > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          draft: false
